@ -0,0 +1,97 @@
spring.application.name=telemetria

# =========================================
# CONFIGURACOES BANCO DE DADOS
# =========================================
spring.datasource.url=jdbc:mysql://localhost:3306/telemetria?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================================
# CONFIGURACOES DO JPA
# =========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# =========================================
# CONFIGURACOES DO FLYWAY (DESATIVADO)
# =========================================
spring.flyway.enabled=false
# spring.flyway.baseline-on-migrate=true
# spring.flyway.baseline-version=0
# spring.flyway.validate-on-migrate=true
# spring.flyway.locations=classpath:db/migration

# =========================================
# CONFIGURACOES DO JWT
# =========================================
jwt.expiration=3600000
jwt.refresh.expiration=86400000
jwt.secret=SUA_CHAVE_SECRETA_AQUI

# =========================================
# OPENWEATHERMAP API
# =========================================
openweather.api.key=
openweather.api.url=https://api.openweathermap.org/data/2.5/weather
openweather.api.units=metric
openweather.api.lang=pt_br

# =========================================
# IPLOCATE API
# =========================================
iplocate.api.key=
iplocate.api.url=https://iplocate.io/api/lookup

# =========================================
# KAFKA CONFIGURATION
# =========================================
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=telemetria-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.max-poll-records=50
spring.kafka.listener.ack-mode=manual_immediate
spring.kafka.listener.concurrency=3
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.topic.telemetria=telemetria-raw
spring.kafka.topic.alertas=telemetria-alertas
spring.kafka.topic.desvios=telemetria-desvios
spring.kafka.topic.dlq=telemetria-dlq

# =========================================
# REDIS CONFIGURATION
# =========================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=123456
spring.data.redis.timeout=2000
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# =========================================
# MQTT CONFIGURATION
# =========================================
mqtt.broker.url=tcp://localhost:1883
mqtt.client.id=telemetria-server-${random.int}
mqtt.username=root
mqtt.password=123456
mqtt.default.topic=/veiculo/+/telemetria
mqtt.qos=1
mqtt.connection.timeout=30
mqtt.keep.alive.interval=60

# =========================================
# EMQX DASHBOARD CONFIGURATION
# =========================================
emqx.dashboard.url=http://localhost:18083
emqx.dashboard.username=root
emqx.dashboard.password=123456
