# ========================================================
# DATASOURCE - MYSQL
# ========================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/telemetria?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo&characterEncoding=UTF-8&createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ========================================================
# JPA / HIBERNATE
# ========================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=false

# ========================================================
# FLYWAY
# ========================================================
spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration
spring.flyway.table=schema_history
spring.flyway.out-of-order=true

# ========================================================
# REDIS
# ========================================================
spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:redis123}
spring.cache.redis.time-to-live=600000
spring.cache.redis.cache-null-values=false

# ========================================================
# JWT
# ========================================================
jwt.secret=${JWT_SECRET:devSecretKey1234567890123456789012345678901234567890}
jwt.expiration=86400000
jwt.refresh-expiration=604800000
jwt.refresh.expiration=604800000

# ========================================================
# KAFKA
# ========================================================
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=telemetry-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.retries=3

# ========================================================
# MQTT
# ========================================================
mqtt.broker.url=${MQTT_BROKER_URL:tcp://localhost:1883}
mqtt.client.id=${MQTT_CLIENT_ID:telemetry-service}
mqtt.username=${MQTT_USERNAME:}
mqtt.password=${MQTT_PASSWORD:}
mqtt.default.topic=telemetry/#
mqtt.qos=1
mqtt.connection-timeout=30
mqtt.keep-alive-interval=60

# ========================================================
# GEOLOCALIZAÇÃO
# ========================================================
# OpenWeather API
openweather.api.key=${OPENWEATHER_API_KEY:91b6024312de28818287658535809806}
openweather.api.url=${OPENWEATHER_API_URL:https://api.openweathermap.org/data/2.5/weather}

# IPLocate API
iplocate.api.key=${IPLOCATE_API_KEY:bca9a31b2cf5b255ec67c39b6bd34059}
iplocate.api.url=${IPLOCATE_API_URL:https://www.iplocate.io/api/lookup/}

# ========================================================
# JACKSON
# ========================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=America/Sao_Paulo
spring.jackson.default-property-inclusion=non_null

# ========================================================
# MULTIPART
# ========================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ========================================================
# LOGGING
# ========================================================
logging.level.root=INFO
logging.level.com.app.telemetry=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF

logging.file.name=logs/telemetry.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30

# ========================================================
# ACTUATOR
# ========================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always


# ========================================================
# LOGGING DETALHADO
# ========================================================

logging.level.com.app.telemetria=DEBUG
logging.level.com.app.telemetria.domain.service=DEBUG
logging.level.com.app.telemetria.api.controller=DEBUG

logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO
logging.level.com.zaxxer.hikari=INFO

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ========================================================
# LOGGING DETALHADO - BACKPRESSURE
# ========================================================
logging.level.com.app.telemetria.api.controller.BackpressureAdminController=DEBUG
logging.level.com.app.telemetria.application.service.BackpressureMonitorService=DEBUG

# ========================================================
# LOGGING DETALHADO - CACHE
# ========================================================
logging.level.com.app.telemetria.api.controller.CacheAdminController=DEBUG
logging.level.com.app.telemetria.application.service.CacheWarmingService=DEBUG


# ========================================================
# LOGGING DETALHADO - DESVIOS DE ROTA
# ========================================================
logging.level.com.app.telemetria.api.controller.DesvioRotaController=DEBUG
logging.level.com.app.telemetria.domain.service.VeiculoService=DEBUG
logging.level.com.app.telemetria.domain.service.RotaService=DEBUG
logging.level.com.app.telemetria.infrastructure.persistence.DesvioRotaRepository=TRACE


# ========================================================
# LOGGING DETALHADO - MOTORISTAS
# ========================================================
logging.level.com.app.telemetria.api.controller.MotoristaController=DEBUG
logging.level.com.app.telemetria.domain.service.MotoristaService=DEBUG
logging.level.com.app.telemetria.infrastructure.persistence.MotoristaRepository=TRACE

# ========================================================
# LOGGING DETALHADO - TELEMETRIA
# ========================================================
logging.level.com.app.telemetria.api.controller.TelemetriaController=DEBUG
logging.level.org.apache.kafka=INFO
logging.level.org.springframework.kafka=DEBUG


# Logs do Spring Boot
logging.level.com.app.telemetria.application.startup=DEBUG
logging.level.org.springframework.boot=INFO


spring.profiles.active=dev

