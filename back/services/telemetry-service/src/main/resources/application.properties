server.port=9050

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/telemetria?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo&characterEncoding=UTF-8&createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

spring.flyway.enabled=false

spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:redis123}
spring.cache.redis.time-to-live=600000
spring.cache.redis.cache-null-values=false

jwt.secret=${JWT_SECRET:devSecretKey1234567890123456789012345678901234567890}
jwt.expiration=86400000
jwt.refresh.expiration=604800000

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=telemetry-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.retries=3
spring.kafka.listener.ack-mode=manual

mqtt.broker.url=${MQTT_BROKER_URL:tcp://localhost:1883}
mqtt.client.id=${MQTT_CLIENT_ID:telemetry-service}
mqtt.username=${MQTT_USERNAME:}
mqtt.password=${MQTT_PASSWORD:}
mqtt.default.topic=telemetry/#
mqtt.qos=1
mqtt.connection-timeout=30
mqtt.keep-alive-interval=60

openweather.api.key=${OPENWEATHER_API_KEY:}
openweather.api.url=${OPENWEATHER_API_URL:https://api.openweathermap.org/data/2.5/weather}

iplocate.api.key=${IPLOCATE_API_KEY:}
iplocate.api.url=${IPLOCATE_API_URL:https://www.iplocate.io/api/lookup/}

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=America/Sao_Paulo
spring.jackson.default-property-inclusion=non_null

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

logging.level.root=INFO
logging.level.com.app.telemetria=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF

logging.file.name=logs/telemetry.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.tags.environment=${spring.profiles.active}

logging.level.com.app.telemetria.domain.service=DEBUG
logging.level.com.app.telemetria.api.controller=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO
logging.level.com.zaxxer.hikari=INFO

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

logging.level.com.app.telemetria.api.controller.BackpressureAdminController=DEBUG
logging.level.com.app.telemetria.application.service.BackpressureMonitorService=DEBUG

logging.level.com.app.telemetria.api.controller.CacheAdminController=DEBUG
logging.level.com.app.telemetria.application.service.CacheWarmingService=DEBUG

logging.level.com.app.telemetria.api.controller.DesvioRotaController=DEBUG
logging.level.com.app.telemetria.domain.service.VeiculoService=DEBUG
logging.level.com.app.telemetria.domain.service.RotaService=DEBUG
logging.level.com.app.telemetria.infrastructure.persistence.DesvioRotaRepository=TRACE

logging.level.com.app.telemetria.api.controller.MotoristaController=DEBUG
logging.level.com.app.telemetria.domain.service.MotoristaService=DEBUG
logging.level.com.app.telemetria.infrastructure.persistence.MotoristaRepository=TRACE

logging.level.com.app.telemetria.api.controller.TelemetriaController=DEBUG
logging.level.org.apache.kafka=INFO
logging.level.org.springframework.kafka=DEBUG

logging.level.com.app.telemetria.application.startup=DEBUG
logging.level.org.springframework.boot=INFO

spring.profiles.active=dev

geofence.cooldown.minutes=5

# ========================================================
# PRIORITY ROUTING (RN-TEL-001)
# ========================================================
priority.normal.batch.interval.ms=500
priority.normal.batch.max.size=200
priority.critical.queue.max=10000

# ========================================================
# GPS VALIDATION (RN-TEL-002)
# ========================================================
gps.velocidade.max=300
gps.velocidade.consecutivos=2
gps.salto.distancia=100
gps.salto.tempo=60
gps.hdop.limite=10
gps.hdop.tempo_minutos=5
gps.satelites.limite=4
gps.satelites.tempo_minutos=10

# ========================================================
# GSM COMPRESSION (RN-TEL-004)
# ========================================================
gsm.rssi.normal=-85
gsm.rssi.reduced=-95
gsm.buffer.max.size=5000
gsm.buffer.ttl.minutes=1440

# ========================================================
# RETENTION POLICY (RF06)
# ========================================================
retencao.enterprise.dias=365

# ========================================================
# EXTRA LOGGING
# ========================================================
logging.level.com.telemetria=DEBUG
logging.level.com.telemetria.application.service=DEBUG
logging.level.com.telemetria.infrastructure.messaging=DEBUG
logging.level.com.telemetria.domain.service=DEBUG
logging.level.com.telemetria.infrastructure.metrics=DEBUG
logging.level.com.telemetria.infrastructure.integration.routing=DEBUG
logging.level.org.springframework.kafka.listener=DEBUG
logging.level.kafka=DEBUG
logging.level.org.springframework.boot.actuate=DEBUG

backpressure.lag.threshold=5000
backpressure.cpu.threshold=95
backpressure.memory.threshold=95