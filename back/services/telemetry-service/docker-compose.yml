services:
  mysql:
    image: mysql:8.0
    container_name: telemetry-mysql-local
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: telemetria
    ports:
      - "3306:3306"
    volumes:
      - mysql_local_data:/var/lib/mysql
      - ./docker/mysql/conf:/etc/mysql/conf.d
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --event-scheduler=ON
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - telemetry-local-network

  redis:
    image: redis:7-alpine
    container_name: telemetry-redis-local
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis_local_data:/data
    command: redis-server --appendonly yes --requirepass redis123
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - telemetry-local-network

  # ── KAFKA + ZOOKEEPER ──────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: telemetry-zookeeper-local
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - telemetry-local-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: telemetry-kafka-local
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - telemetry-local-network

  # ── MQTT BROKER (Eclipse Mosquitto) ───────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: telemetry-mosquitto-local
    restart: always
    ports:
      - "1883:1883"
      - "9083:9083"   # WebSocket MQTT
    volumes:
      - ./docker/mosquitto/config:/mosquitto/config
      - mosquitto_local_data:/mosquitto/data
      - mosquitto_local_log:/mosquitto/log
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "localhost", "-t", "health", "-m", "ping", "-q", "0"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - telemetry-local-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telemetry-app-local
    restart: on-failure
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/telemetria?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo&characterEncoding=UTF-8&createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis123
      JWT_SECRET: devSecretKey1234567890123456789012345678901234567890
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MQTT_BROKER_URL: tcp://mosquitto:1883
      MQTT_CLIENT_ID: telemetry-service-local
      MQTT_USERNAME: ""
      MQTT_PASSWORD: ""
    volumes:
      - app_logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    networks:
      - telemetry-local-network

volumes:
  mysql_local_data:
  redis_local_data:
  mosquitto_local_data:
  mosquitto_local_log:
  app_logs:

networks:
  telemetry-local-network:
    driver: bridge