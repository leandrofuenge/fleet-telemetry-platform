services:
  mysql:
    image: mysql:8.0
    container_name: telemetry-mysql-local
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: telemetria
    ports:
      - "3306:3306"
    volumes:
      - mysql_local_data:/var/lib/mysql
      - ./docker/mysql/conf:/etc/mysql/conf.d
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --event-scheduler=ON
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - telemetry-local-network

  redis:
    image: redis:7-alpine
    container_name: telemetry-redis-local
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis_local_data:/data
    command: redis-server --appendonly yes --requirepass redis123
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - telemetry-local-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: telemetry-zookeeper-local
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - telemetry-local-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: telemetry-kafka-local
    restart: always
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - telemetry-local-network

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: telemetry-mosquitto-local
    restart: always
    ports:
      - "1883:1883"
      - "9083:9083"
    volumes:
      - ./docker/mosquitto/config:/mosquitto/config
      - mosquitto_local_data:/mosquitto/data
      - mosquitto_local_log:/mosquitto/log
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "localhost", "-t", "health", "-m", "ping", "-q", "0"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - telemetry-local-network

  sonarqube:
    image: sonarqube:latest
    container_name: telemetry-sonarqube-local
    restart: always
    depends_on:
      sonarqube_db:
        condition: service_healthy
    ports:
      - "9050:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube_db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - telemetry-local-network

  sonarqube_db:
    image: postgres:15-alpine
    container_name: telemetry-sonarqube-db
    restart: always
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - sonarqube_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - telemetry-local-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telemetry-app-local
    restart: on-failure
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/telemetria?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo&characterEncoding=UTF-8&createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis123
      JWT_SECRET: devSecretKey1234567890123456789012345678901234567890
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MQTT_BROKER_URL: tcp://mosquitto:1883
      MQTT_CLIENT_ID: telemetry-service-local
      MQTT_USERNAME: ""
      MQTT_PASSWORD: ""
      OPENWEATHER_API_KEY: ""
      OPENWEATHER_API_URL: "https://api.openweathermap.org/data/2.5/weather"
      IPLOCATE_API_KEY: ""
      IPLOCATE_API_URL: "https://www.iplocate.io/api/lookup/"
      SERVER_PORT: 8080
    volumes:
      - app_logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    cpus: 8
    mem_limit: 8g
    mem_reservation: 4g
    networks:
      - telemetry-local-network

  # ========================================================
  # PROMETHEUS - Coleta métricas da aplicação
  # ========================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: telemetry-prometheus-local
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - telemetry-local-network

  # ========================================================
  # GRAFANA - Visualização das métricas
  # ========================================================
  grafana:
    image: grafana/grafana:latest
    container_name: telemetry-grafana-local
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    networks:
      - telemetry-local-network

volumes:
  mysql_local_data:
  redis_local_data:
  mosquitto_local_data:
  mosquitto_local_log:
  app_logs:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonarqube_db_data:
  prometheus_data:
  grafana_data:

networks:
  telemetry-local-network:
    driver: bridge
