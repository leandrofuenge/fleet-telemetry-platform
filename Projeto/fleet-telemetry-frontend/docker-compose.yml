version: '3.8'

services:
  php-frontend:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: fleet-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./data:/var/www/html/data
    environment:
      - API_URL=http://host.docker.internal:9050/api/v1
      - ROUTING_API_URL=http://host.docker.internal:8082/api
      - PUBLIC_API_URL=http://localhost:9050/api/v1
      - PUBLIC_WS_URL=ws://localhost:9050/ws
      - PHP_DISPLAY_ERRORS=On
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - fleet-network

networks:
  fleet-network:
    name: fleet_network
    driver: bridge