services:
  # ========================================
  # FRONTEND PHP
  # ========================================
  php-frontend:
    build: ./fleet-telemetry-frontend          # ← CORRIGIDO
    container_name: fleet-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./fleet-telemetry-frontend/data:/var/www/html/data
    environment:
      - API_URL=http://telemetry-service:8081/api
      - ROUTING_API_URL=http://routing-service:8082/api
      - PHP_DISPLAY_ERRORS=On
    networks:
      - fleet-network
    depends_on:
      - telemetry-service
      - routing-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ========================================
  # TELEMETRY SERVICE
  # ========================================
  telemetry-service:
    build: ./back/services/telemetry-service
    container_name: fleet-telemetry-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8081
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/fleet_telemetry
      - SPRING_DATASOURCE_USERNAME=fleet_user
      - SPRING_DATASOURCE_PASSWORD=fleet_pass
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_REDIS_PASSWORD=redis_pass
      - MQTT_BROKER_URL=tcp://mosquitto:1883
    networks:
      - fleet-network
    depends_on:
      - postgres
      - redis
      - mosquitto

  # ========================================
  # ROUTING SERVICE
  # ========================================
  routing-service:
    build: ./back/services/routing-service
    container_name: fleet-routing-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8082
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/fleet_routing
      - SPRING_DATASOURCE_USERNAME=fleet_user
      - SPRING_DATASOURCE_PASSWORD=fleet_pass
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_REDIS_PASSWORD=redis_pass
    networks:
      - fleet-network
    depends_on:
      - postgres
      - redis

  # ========================================
  # POSTGRESQL
  # ========================================
  postgres:
    image: postgis/postgis:15-3.4-alpine
    container_name: fleet-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=fleet_telemetry
      - POSTGRES_USER=fleet_user
      - POSTGRES_PASSWORD=fleet_pass
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - fleet-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleet_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================================
  # REDIS
  # ========================================
  redis:
    image: redis:7-alpine
    container_name: fleet-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass redis_pass
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - fleet-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_pass", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================================
  # MOSQUITTO MQTT
  # ========================================
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: fleet-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - mosquitto-data:/mosquitto/data
    networks:
      - fleet-network

networks:
  fleet-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  mosquitto-data: