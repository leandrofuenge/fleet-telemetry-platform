services:
  telemetry-service:
    build: .
    container_name: fleet-telemetry-service
    restart: unless-stopped
    ports:
      - "9050:9050"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 9050
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/telemetria?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo&characterEncoding=UTF-8&createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
      SPRING_FLYWAY_ENABLED: "false"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ""
      JWT_SECRET: devSecretKey1234567890123456789012345678901234567890
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MQTT_BROKER_URL: tcp://mosquitto:1883
      MQTT_CLIENT_ID: telemetry-service
      OPENWEATHER_API_KEY: ""
      IPLOCATE_API_KEY: ""
    volumes:
      - ../../../logs:/app/logs
    networks:
      - fleet-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_healthy
      mosquitto:
        condition: service_started

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: telemetria
    ports:
      - "3306:3306"
    networks:
      - fleet-network
    healthcheck:
      test: ["CMD-SHELL", "mysql -h localhost -uroot -proot123 -e 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 60s

  redis:
    image: redis:7
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - fleet-network

  zookeeper:
    image: zookeeper:3.9
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    networks:
      - fleet-network

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: kafka
    restart: unless-stopped
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - fleet-network
    depends_on:
      zookeeper:
        condition: service_started
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    networks:
      - fleet-network

networks:
  fleet-network:
    name: fleet-network